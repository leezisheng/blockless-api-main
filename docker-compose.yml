# Local dev stack for the blockless-api gateway.
#
#   docker compose --profile local up -d
#
# Brings up the datastore + the backing services the gateway dispatches to over gRPC.
# The `*-stub` images are lightweight local stand-ins for the production tiers
# (GPU inference, solver, simulation) so the gateway boots end-to-end on a laptop.

services:
  postgres:
    image: postgres:16
    profiles: ["local", "db"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mpyhw
    ports: ["55432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5-community
    profiles: ["local"]
    environment:
      NEO4J_AUTH: neo4j/blockless-dev
      NEO4J_PLUGINS: '["apoc"]'
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4jdata:/data"]

  redis:
    image: redis:7-alpine
    profiles: ["local"]
    ports: ["6379:6379"]

  kafka:
    image: bitnami/kafka:3.7
    profiles: ["local"]
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
    ports: ["9092:9092"]

  # ---- backing service stubs (production tiers deploy separately) ----
  inference-stub:
    image: ghcr.io/blockless/inference-stub:latest
    profiles: ["local"]
    environment:
      MODEL: blockless-coder-7b
      FALLBACK_PROVIDER: deepseek
    ports: ["9000:9000"]

  constraint-router-stub:
    image: ghcr.io/blockless/router-stub:latest
    profiles: ["local"]
    ports: ["9100:9100"]

  sim-kernel-stub:
    image: ghcr.io/blockless/sim-kernel-stub:latest
    profiles: ["local"]
    ports: ["9200:9200"]

volumes:
  pgdata:
  neo4jdata:
